<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de Clientes y Productos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #e9ecef;
        }
        .form-container {
            max-width: 600px;
            margin: 30px auto;
            padding: 20px;
            background-color: white;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>
    <!-- Formulario para Clientes -->
    <div class="form-container">
        <h2 class="text-center mb-4">Agregar Cliente</h2>
        <div class="mb-3">
            <label for="nombreCliente" class="form-label">Nombre</label>
            <input type="text" class="form-control" id="nombreCliente" placeholder="Ej: Juan Pérez">
        </div>
        <div class="mb-3">
            <label for="emailCliente" class="form-label">Email</label>
            <input type="email" class="form-control" id="emailCliente" placeholder="Ej: juan@example.com">
        </div>
        <button class="btn btn-primary w-100" onclick="agregarCliente()">Agregar Cliente</button>
    </div>

    <!-- Formulario para Productos -->
    <div class="form-container">
        <h2 class="text-center mb-4">Agregar Producto</h2>
        <div class="mb-3">
            <label for="nombreProducto" class="form-label">Nombre</label>
            <input type="text" class="form-control" id="nombreProducto" placeholder="Ej: Collar">
        </div>
        <div class="mb-3">
            <label for="precioProducto" class="form-label">Precio</label>
            <input type="number" class="form-control" id="precioProducto" placeholder="Ej: 15.00">
        </div>
        <div class="mb-3">
            <label for="descProducto" class="form-label">Descripción</label>
            <textarea class="form-control" id="descProducto" placeholder="Ej: Collar ajustable"></textarea>
        </div>
        <button class="btn btn-primary w-100" onclick="agregarProducto()">Agregar Producto</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        async function agregarCliente() {
            const nombre = document.getElementById('nombreCliente').value;
            const email = document.getElementById('emailCliente').value;
            await fetch('http://localhost/api1/conexion_server.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ nombre, email, id: crypto.randomUUID() })
            });
            alert('Cliente agregado');
        }

        async function agregarProducto() {
            const nombre = document.getElementById('nombreProducto').value;
            const precio = document.getElementById('precioProducto').value;
            const descripcion = document.getElementById('descProducto').value;
            await fetch('http://localhost/api1/productos.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ nombre, precio, descripcion, id: crypto.randomUUID() })
            });
            alert('Producto agregado');
        }
    </script>
</body>
</html>
