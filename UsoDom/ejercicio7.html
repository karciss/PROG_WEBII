<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 7: Cambio de atributo con setAtribute</title>
</head>
<body>
    <div id="elemento">Atributo</div>
    <script>
        const elemento = document.getElementById('elemento');
        elemento.setAttribute('data-nuevoAt','valor');
        // para poner nuevo atributo a nuestros elementos
    </script>
</body>
</html>
