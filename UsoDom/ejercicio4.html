<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 4 querySelectorAll</title>
</head>
<body>
    <p>parrafo 1</p>
    <p>parrafo 2</p>
    <p>parrafo 3</p>
    <script>
        const elementos = document.querySelectorAll('p')
        elementos.forEach((elemento)=>{
            elemento.style.display = 'none';
        });
    </script>
</body>
</html>
