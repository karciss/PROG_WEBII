<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 8 Uso Style</title>
</head>
<body>
    <div id="elemento">Cambio de estilos</div>

        elemento.style.backgroundColor = 'black';
