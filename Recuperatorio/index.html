<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>CRUD Local Server</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.gstatic.com" />
    <link href="https://fonts.googleapis.com/css2?family=Dosis&family=Open+Sans&family=Parisienne&display=swap" rel="stylesheet"/>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" rel="stylesheet"/>
</head>
<body>
  <main>
    <div class="container">
      <header>
        <h1>CRUD</h1>
      </header>

      <div class="controls">
        <button class="btn btn-post" id="btnCreate" data-btnCreate>Crear Post (POST)</button>
        <button class="btn btn-put" id="btnUpdate" disabled data-btnUpdate>Actualizar Post (PUT)</button>
      </div>

      <div class="formContainer">
        <form id="taskForm">
          <input type="text" name="task" placeholder="Nombre de la tarea" class="inputForm" data-input-task required />
          <input type="date" name="date" class="inputForm" data-input-fecha required />
          <input type="text" name="description" placeholder="Descripcion" class="inputForm" data-input-descripcion required />
          <input type="text" name="nombre" placeholder="Nombre Asignado" class="inputForm" data-input-nombre required />
          <input type="number" name="numerico" placeholder="Valor Numerico" class="inputForm" data-input-numerico required />
        </form>
      </div>

      <div class="results">
        <h2>Lista de Tareas</h2>
        <table id="taskTable">
          <thead>
            <tr>
              <th>ID</th>
              <th>Nombre</th>
              <th>Descripcion</th>
              <th>Fecha</th>
              <th>Nombre Asignado</th>
              <th>Valor Numerico</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody data-tbody>

          </tbody>
        </table>
      </div>
    </div>

    <script type="module" src="script2.js"></script>
  </main>
</body>
</html>
