<!DOCTYPE html>
<html lang="en">

<body>
    <nav>

        <div class="nav-links">

    </nav>

    <section class="crud-section">
        <h2>Products</h2>

            <tbody>
                <tr>
                    <td>Sourdough Loaf</td>
                    <td>$5.00</td>
                    <td>Classic sourdough bread</td>
                    <td>
                        <a href="#" class="action-btn">Edit</a>

                </tr>
            </tbody>
        </table>
